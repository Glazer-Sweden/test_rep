<style>\n.negative { color: red; }\n</style>\n\n<script>\ndocument.addEventListener('DOMContentLoaded', function() {\n    const ids = ['B9', 'B10', 'B14', 'B15', 'B21', 'B22', 'B23', 'B24', 'B25', 'B27', 'B28', 'B29', 'B30', 'B31'];\n    ids.forEach(id => {\n        const element = document.getElementById(id);\n        if (element && parseFloat(element.textContent) < 0) {\n            element.innerHTML = `<span class='negative'>${element.textContent}</span>`;\n        }\n    });\n});\n</script>
